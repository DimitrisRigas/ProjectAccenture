bundle:
  name: regulatory_compliance_assistant

include:
  - resources/*.yml

sync:
  include:
    - src/**
    - resources/**
  exclude:
    - .venv/**
    - __pycache__/**
    - .pytest_cache/**
    - data/**
    - chroma_db/**
    - .env

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}